# SPDX-License-Identifier: GPL-3.0-or-later
[package]
name = "flowmux-terminal"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false
description = "Terminal backend abstraction for flowmux. Backends: vte4 (default), libghostty (planned)."

[features]
default = ["vte"]
# Enable to compile the libghostty backend (requires libghostty + bindings).
ghostty = []
vte = ["dep:gtk", "dep:vte"]

[dependencies]
flowmux-core = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

gtk = { package = "gtk4", version = "0.9", features = ["v4_6"], optional = true }
vte = { package = "vte4", version = "0.8", features = ["v0_66"], optional = true }

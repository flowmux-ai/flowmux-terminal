app-id: com.flowmux.App
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: flowmux
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.secrets
  # IME: the ibus GTK immodule (forced on by the GUI when GTK_IM_MODULE
  # is unset) reaches the host ibus-daemon through the IBus portal.
  # Without this grant the sandbox falls back to the `simple` immodule
  # on Ubuntu 22.04 hosts and CJK preedit (the composing-syllable
  # underline) never renders.
  - --talk-name=org.freedesktop.portal.IBus
  # flowmux writes its socket into XDG_RUNTIME_DIR; Flatpak isolates this
  # by default so the in-sandbox `flowmux` CLI uses the same path.
  # Terminal pane runs the user's host shell via `flatpak-spawn --host`
  # so it sees host-installed tools (git, tig, …); the helper talks to
  # this D-Bus name on the session bus.
  - --talk-name=org.freedesktop.Flatpak

modules:
  # Build VTE 0.78 from source. VTE 0.80 added a hard dependency on
  # the `fast_float` C++ library, which the GNOME 48 SDK does not
  # ship as a system package; meson's fallback path then tries to
  # `git clone` it from github inside the build sandbox where DNS is
  # unavailable, and configuration aborts. 0.78 still exposes every
  # symbol the rust binding's `v0_70` feature set needs (hyperlink
  # match, regex match, scroll-on-keystroke, …) so we pin there.
  - name: vte
    buildsystem: meson
    config-opts:
      # Force libdir=lib (meson defaults to lib64 on x86_64) so the
      # generated vte-2.91-gtk4.pc lands in /app/lib/pkgconfig, which is
      # what flatpak adds to PKG_CONFIG_PATH and where the runtime
      # linker looks for /app libraries.
      - -Dlibdir=lib
      - -Dgtk3=false
      - -Dgtk4=true
      - -Dvapi=false
      - -Dgir=false
      - -Ddocs=false
      - -D_systemd=false
    cleanup:
      - /bin
      - /libexec
      - /share/vala
    sources:
      - type: git
        url: https://gitlab.gnome.org/GNOME/vte.git
        tag: '0.78.4'
      # Keep text selections alive while a TUI repaints. Upstream VTE
      # deselects whenever the application rewrites the cells under the
      # selection, so a drag-selection in a Codex / Claude Code pane
      # vanishes on the next frame. See packaging/vte-patches.
      - type: patch
        path: ../vte-patches/0001-keep-selection-on-output.patch

  - name: flowmux
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      build-args:
        - --share=network
    build-commands:
      # vte-text enables `flowmux read-screen`; the bundled VTE is 0.78.4
      # (built above), which supports the required text-extraction API.
      - cargo build --release --manifest-path Cargo.toml -p flowmux -p flowmux-cli --features flowmux/vte-text
      - install -Dm755 target/release/flowmux    /app/bin/flowmux
      - install -Dm755 target/release/flowmuxctl /app/lib/flowmux/flowmuxctl
      # Expose flowmuxctl on /app/bin so `flatpak run --command=flowmuxctl
      # com.flowmux.App …` resolves without typing the full /app/lib path.
      # The hook installer (`flowmux hooks setup`, run inside the sandbox)
      # writes plugin entries with exactly this short name so the host-side
      # OpenCode / Claude / Codex spawn lines stay concise.
      - install -d /app/bin
      - ln -sf /app/lib/flowmux/flowmuxctl /app/bin/flowmuxctl
      - install -Dm644 resources/desktop/com.flowmux.App.desktop /app/share/applications/com.flowmux.App.desktop
      - install -Dm644 resources/icons/flowmux.svg /app/share/icons/hicolor/scalable/apps/com.flowmux.App.svg
      - for size in 16 24 32 48 64 96 128 256 512; do install -Dm644 "resources/icons/flowmux-${size}.png" "/app/share/icons/hicolor/${size}x${size}/apps/com.flowmux.App.png"; done
      - install -Dm644 LICENSE /app/share/licenses/flowmux/LICENSE
      - install -Dm644 NOTICE  /app/share/licenses/flowmux/NOTICE
      - install -Dm644 THIRD_PARTY_LICENSES.md /app/share/licenses/flowmux/THIRD_PARTY_LICENSES.md
    sources:
      - type: dir
        path: ../..

app-id: com.flowmux.App
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: flowmux
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.secrets
  # flowmux writes its socket into XDG_RUNTIME_DIR; Flatpak isolates this
  # by default so the in-sandbox `flowmux` CLI uses the same path.
  # flowmux is a terminal emulator, so the spawned shell needs to run on
  # the host (not inside the sandbox) to see the user's `~/.bashrc`,
  # host-installed binaries (git, tig, etc.), and their actual PATH.
  # The terminal pane wraps argv with `flatpak-spawn --host` when it
  # detects /.flatpak-info, and that helper talks to this D-Bus name.
  - --talk-name=org.freedesktop.Flatpak

modules:
  # libvte is not bundled in org.gnome.Platform (terminal lib, not generic
  # GNOME). Build it from upstream so the vte4-sys crate's pkg-config probe
  # finds `vte-2.91-gtk4 >= 0.76` inside the sandbox.
  - name: vte
    buildsystem: meson
    # vte 0.80 pulls fast_float as a meson subproject (cloned from
    # github at configure time), so this module needs network too.
    build-options:
      build-args:
        - --share=network
    config-opts:
      # Force libdir=lib (meson defaults to lib64 on x86_64) so the
      # generated vte-2.91-gtk4.pc lands in /app/lib/pkgconfig, which is
      # what flatpak adds to PKG_CONFIG_PATH and where the runtime linker
      # looks for /app libraries.
      - -Dlibdir=lib
      - -Dgtk3=false
      - -Dgtk4=true
      - -Dvapi=false
      - -Dgir=false
      - -Ddocs=false
      - -D_systemd=false
    cleanup:
      - /bin
      - /libexec
      - /share/vala
    sources:
      - type: git
        url: https://gitlab.gnome.org/GNOME/vte.git
        tag: '0.80.0'

  - name: flowmux
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      build-args:
        - --share=network
    build-commands:
      - cargo build --release --manifest-path Cargo.toml -p flowmux -p flowmux-cli
      - install -Dm755 target/release/flowmux    /app/bin/flowmux
      - install -Dm755 target/release/flowmuxctl /app/lib/flowmux/flowmuxctl
      - install -Dm644 resources/desktop/com.flowmux.App.desktop /app/share/applications/com.flowmux.App.desktop
      - install -Dm644 resources/icons/flowmux.svg /app/share/icons/hicolor/scalable/apps/com.flowmux.App.svg
      - for size in 16 24 32 48 64 96 128 256 512; do install -Dm644 "resources/icons/flowmux-${size}.png" "/app/share/icons/hicolor/${size}x${size}/apps/com.flowmux.App.png"; done
      - install -Dm644 LICENSE /app/share/licenses/flowmux/LICENSE
      - install -Dm644 NOTICE  /app/share/licenses/flowmux/NOTICE
      - install -Dm644 THIRD_PARTY_LICENSES.md /app/share/licenses/flowmux/THIRD_PARTY_LICENSES.md
    sources:
      - type: dir
        path: ../..

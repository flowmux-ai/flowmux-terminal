# SPDX-License-Identifier: GPL-3.0-or-later
app-id: com.flowmux.App
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: flowmux
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.secrets
  # flowmux writes its socket into XDG_RUNTIME_DIR; Flatpak isolates this
  # by default so the in-sandbox `flowmux` CLI uses the same path.
  # Terminal pane runs the user's host shell via `flatpak-spawn --host`
  # so it sees host-installed tools (git, tig, …); the helper talks to
  # this D-Bus name on the session bus.
  - --talk-name=org.freedesktop.Flatpak

modules:
  - name: flowmux
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
      env:
        # Use the pre-fetched ghostty checkout instead of cloning from
        # github.com during the build (the build sandbox can't always
        # reach github.com, and even when it can the clone is fragile).
        # The commit must match GHOSTTY_COMMIT in libghostty-vt-sys's
        # build.rs.
        GHOSTTY_SOURCE_DIR: /run/build/flowmux/ghostty-src
    build-commands:
      - bash packaging/flatpak/bootstrap-toolchain.sh cargo build --release --manifest-path Cargo.toml -p flowmux -p flowmux-cli
      - install -Dm755 target/release/flowmux    /app/bin/flowmux
      - install -Dm755 target/release/flowmuxctl /app/lib/flowmux/flowmuxctl
      - |
        set -eu
        ghostty_lib_dir="$(find target/release/build -path '*/ghostty-install/lib' -type d -print -quit)"
        if [ -z "$ghostty_lib_dir" ]; then
            echo "libghostty-vt build output was not found" >&2
            exit 1
        fi
        install -d /app/lib
        cp -P "$ghostty_lib_dir"/libghostty-vt.so* /app/lib/
      - install -Dm644 resources/desktop/com.flowmux.App.desktop /app/share/applications/com.flowmux.App.desktop
      - install -Dm644 resources/icons/flowmux.svg /app/share/icons/hicolor/scalable/apps/com.flowmux.App.svg
      - for size in 16 24 32 48 64 96 128 256 512; do install -Dm644 "resources/icons/flowmux-${size}.png" "/app/share/icons/hicolor/${size}x${size}/apps/com.flowmux.App.png"; done
      - install -Dm644 LICENSE /app/share/licenses/flowmux/LICENSE
      - install -Dm644 NOTICE  /app/share/licenses/flowmux/NOTICE
      - install -Dm644 THIRD_PARTY_LICENSES.md /app/share/licenses/flowmux/THIRD_PARTY_LICENSES.md
    sources:
      - type: dir
        path: ../..
      # Pre-fetched ghostty source. Must match the GHOSTTY_COMMIT pin in
      # libghostty-vt-sys 0.1.1's build.rs so cargo's checked-in
      # bindings line up with the C ABI. flatpak-builder downloads
      # this during its prepare phase (host network) so the in-sandbox
      # build never needs github.com.
      - type: git
        url: https://github.com/ghostty-org/ghostty.git
        commit: bebca84668947bfc92b9a30ed58712e1c34eee1d
        dest: ghostty-src

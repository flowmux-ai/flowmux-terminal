# SPDX-License-Identifier: GPL-3.0-or-later

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0). Must already exist.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build linux-x86_64
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: "1"
      TARGET_TRIPLE: x86_64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve version
        id: ver
        run: |
          ref="${{ inputs.tag || github.ref_name }}"
          version="${ref#v}"
          echo "tag=$ref" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-release-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgtk-4-dev libadwaita-1-dev \
            libwebkitgtk-6.0-dev libssl-dev \
            libssh2-1-dev libdbus-1-dev libsecret-1-dev

      - name: Install Zig
        # libghostty-vt-sys builds the embedded ghostty source with
        # `zig build`, so the runner needs a Zig toolchain on PATH. The
        # version is kept in lockstep with packaging/flatpak/bootstrap-
        # toolchain.sh so local, Flatpak, and CI builds all compile the
        # same ghostty revision against the same compiler.
        env:
          ZIG_VERSION: 0.15.2
        run: |
          set -euxo pipefail
          tarball="zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          curl -L --fail "https://ziglang.org/download/${ZIG_VERSION}/${tarball}" \
            -o /tmp/zig.tar.xz
          sudo mkdir -p /opt/zig
          sudo tar -C /opt/zig --strip-components=1 -xJf /tmp/zig.tar.xz
          echo "/opt/zig" >> "$GITHUB_PATH"
          /opt/zig/zig version

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build release binaries
        run: |
          cargo build --release --locked \
            -p flowmux -p flowmux-cli -p flowmux-daemon

      - name: Stage tarball
        run: |
          set -euxo pipefail
          stage_name="flowmux-${{ steps.ver.outputs.version }}-${TARGET_TRIPLE}"
          stage="dist/${stage_name}"
          mkdir -p "$stage"
          cp target/release/flowmux        "$stage/"
          cp target/release/flowmuxctl     "$stage/"
          cp target/release/flowmux-daemon "$stage/"
          cp LICENSE NOTICE README.md      "$stage/"
          if [ -f THIRD_PARTY_LICENSES.md ]; then
            cp THIRD_PARTY_LICENSES.md "$stage/"
          fi
          tar -C dist -czf "dist/${stage_name}.tar.gz" "$stage_name"
          (cd dist && sha256sum "${stage_name}.tar.gz" > "${stage_name}.tar.gz.sha256")

      - name: Build .deb package
        run: |
          set -euxo pipefail
          cargo deb -p flowmux --no-build \
            --output "dist/flowmux_${{ steps.ver.outputs.version }}_amd64.deb"
          (cd dist && sha256sum "flowmux_${{ steps.ver.outputs.version }}_amd64.deb" \
            > "flowmux_${{ steps.ver.outputs.version }}_amd64.deb.sha256")

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flowmux-linux-x86_64
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.deb
            dist/*.deb.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Full history + tags are required so the release-notes step can diff
      # this tag against the previous v* tag and produce a categorized
      # commit list. fetch-depth: 0 pulls the whole graph, and fetch-tags
      # ensures local tag refs are present even when this run was triggered
      # via workflow_dispatch.
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve tag
        id: ver
        run: |
          ref="${{ inputs.tag || github.ref_name }}"
          echo "tag=$ref" >> "$GITHUB_OUTPUT"

      - name: Resolve previous tag
        id: prev
        run: |
          set -euo pipefail
          tag="${{ steps.ver.outputs.tag }}"
          # Pick the highest v* tag that isn't this one. Sorting by
          # version:refname keeps SemVer ordering correct (0.1.10 > 0.1.9),
          # which `--sort=-creatordate` would not.
          prev=$(git tag --list 'v*' --sort=-version:refname \
            | grep -vFx "$tag" \
            | head -n1 || true)
          echo "tag=$prev" >> "$GITHUB_OUTPUT"
          if [ -n "$prev" ]; then
            echo "Previous tag: $prev"
          else
            echo "No previous tag — treating as initial release."
          fi

      - name: Build release notes
        id: notes
        env:
          PREV_TAG: ${{ steps.prev.outputs.tag }}
          TAG: ${{ steps.ver.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 <<'PY' > RELEASE_NOTES.md
          import os, re, subprocess

          prev = os.environ.get("PREV_TAG", "")
          tag  = os.environ["TAG"]
          repo = os.environ["REPO"]

          # When there's no previous tag (very first release), include the
          # whole reachable history. Otherwise diff against the predecessor.
          rev_range = f"{prev}..{tag}" if prev else tag
          log = subprocess.check_output(
              ["git", "log", "--no-merges", "--pretty=format:%h%x09%s", rev_range],
              text=True,
          ).strip()

          # Conventional Commits buckets, ordered as they should appear in
          # the release body. The leading regex strips the type/scope so the
          # printed line reads as a plain bullet.
          categories = [
              ("Features",      re.compile(r"^feat(\([^)]+\))?!?:\s*", re.I)),
              ("Bug fixes",     re.compile(r"^fix(\([^)]+\))?!?:\s*",  re.I)),
              ("Performance",   re.compile(r"^perf(\([^)]+\))?!?:\s*", re.I)),
              ("Refactoring",   re.compile(r"^refactor(\([^)]+\))?!?:\s*", re.I)),
              ("Documentation", re.compile(r"^docs(\([^)]+\))?!?:\s*", re.I)),
              ("CI / Build",    re.compile(r"^(ci|build|chore)(\([^)]+\))?!?:\s*", re.I)),
              ("Tests",         re.compile(r"^test(\([^)]+\))?!?:\s*", re.I)),
          ]
          buckets = {name: [] for name, _ in categories}
          others  = []

          for line in log.splitlines():
              if not line:
                  continue
              sha, subject = line.split("\t", 1)
              for name, pat in categories:
                  if pat.match(subject):
                      buckets[name].append((sha, subject))
                      break
              else:
                  others.append((sha, subject))

          out = []

          # Highlights: top feat: subjects (capped) with the type prefix
          # stripped so they read as plain user-facing summaries.
          highlight_strip = re.compile(r"^[a-z]+(\([^)]+\))?!?:\s*", re.I)
          features = buckets["Features"]
          if features:
              out.append("## Highlights")
              for sha, subject in features[:5]:
                  out.append(f"- {highlight_strip.sub('', subject)}")
              out.append("")

          out.append("## What's Changed")
          out.append("")
          for name, _ in categories:
              items = buckets[name]
              if not items:
                  continue
              out.append(f"### {name}")
              for sha, subject in items:
                  out.append(f"- {subject} ({sha})")
              out.append("")
          if others:
              out.append("### Other")
              for sha, subject in others:
                  out.append(f"- {subject} ({sha})")
              out.append("")

          if prev:
              out.append(f"**Full Changelog**: https://github.com/{repo}/compare/{prev}...{tag}")
          else:
              out.append("_Initial release — full history included above._")

          print("\n".join(out).rstrip() + "\n")
          PY

          echo "===== RELEASE_NOTES.md ====="
          cat RELEASE_NOTES.md
          echo "============================"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.tag, '-') }}
          # Custom body built from the commit log; we deliberately turn off
          # the GitHub auto-generated PR section because the project pushes
          # directly to main, so the auto section would duplicate the same
          # commits without the conventional-commits grouping.
          body_path: RELEASE_NOTES.md
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.deb
            dist/*.deb.sha256

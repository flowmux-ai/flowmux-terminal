name: Test

on:
#  pull_request:
#  push:
#    branches:
#      - main
#      - master
  workflow_dispatch:

jobs:
  cargo-test:
    name: cargo test
    runs-on: ubuntu-latest
    env:
      GDK_BACKEND: x11
      GTK_A11Y: none
      RUST_BACKTRACE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgtk-4-dev libadwaita-1-dev \
            libwebkitgtk-6.0-dev libssl-dev \
            libssh2-1-dev libdbus-1-dev \
            dbus-x11 xvfb

      - name: Install Zig
        # libghostty-vt-sys compiles the embedded ghostty source with
        # `zig build`, so the runner needs a Zig toolchain on PATH.
        # Version stays aligned with packaging/flatpak/bootstrap-
        # toolchain.sh and .github/workflows/release.yml.
        env:
          ZIG_VERSION: 0.15.2
        run: |
          set -euxo pipefail
          tarball="zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          curl -L --fail "https://ziglang.org/download/${ZIG_VERSION}/${tarball}" \
            -o /tmp/zig.tar.xz
          sudo mkdir -p /opt/zig
          sudo tar -C /opt/zig --strip-components=1 -xJf /tmp/zig.tar.xz
          echo "/opt/zig" >> "$GITHUB_PATH"
          /opt/zig/zig version

      - name: Run tests
        run: xvfb-run -a dbus-run-session -- cargo test --workspace --locked -- --nocapture

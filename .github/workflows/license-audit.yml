# SPDX-License-Identifier: GPL-3.0-or-later

name: License audit

on:
  pull_request:
    paths:
      - Cargo.lock
      - deny.toml
      - about.toml
      - about.hbs
      - THIRD_PARTY_LICENSES.md
      - scripts/generate-third-party-licenses.sh
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:

jobs:
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Install cargo-about
        run: cargo install cargo-about --locked --features cli

      - name: Check dependency licenses and sources
        run: cargo deny --locked check licenses sources

      - name: Check third-party license notice
        run: |
          scripts/generate-third-party-licenses.sh
          git diff --exit-code THIRD_PARTY_LICENSES.md
